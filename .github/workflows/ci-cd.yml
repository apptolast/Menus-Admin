# ============================================
# CI/CD Pipeline for MenuAdmin
# Kotlin Multiplatform - WASM Web Application
# Single environment (production)
# ============================================

name: CI/CD Pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

env:
    DOCKER_IMAGE: apptolast/menus-admin
    K8S_NAMESPACE: apptolast-menus-admin

jobs:
    # ============================================
    # Build and Test
    # ============================================
    build:
        name: Build & Test
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Set up JDK 21
                uses: actions/setup-java@v4
                with:
                    java-version: '21'
                    distribution: 'temurin'
                    cache: 'gradle'

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Create local.properties with API URL
                run: |
                    echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" > local.properties
                    echo "local.properties created with API_BASE_URL"

            -   name: Upgrade Yarn Lock files
                run: |
                    ./gradlew kotlinUpgradeYarnLock --no-daemon
                    ./gradlew kotlinWasmUpgradeYarnLock --no-daemon

            -   name: Build WASM Distribution
                run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon --stacktrace

            -   name: Upload build artifacts
                uses: actions/upload-artifact@v4
                with:
                    name: wasm-distribution
                    path: composeApp/build/dist/wasmJs/productionExecutable/
                    retention-days: 1

    # ============================================
    # Docker Build and Push
    # ============================================
    docker:
        name: Docker Build & Push
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        outputs:
            image_tag: ${{ steps.meta.outputs.tags }}
            version: ${{ steps.version.outputs.version }}

        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3

            -   name: Login to Docker Hub
                uses: docker/login-action@v3
                with:
                    username: ${{ secrets.DOCKERHUB_USERNAME }}
                    password: ${{ secrets.DOCKERHUB_TOKEN }}

            -   name: Generate version
                id: version
                run: |
                    VERSION="$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}"
                    echo "version=$VERSION" >> $GITHUB_OUTPUT
                    echo "Generated version: $VERSION"

            -   name: Docker meta
                id: meta
                uses: docker/metadata-action@v5
                with:
                    images: ${{ env.DOCKER_IMAGE }}
                    tags: |
                        type=raw,value=${{ steps.version.outputs.version }}
                        type=raw,value=latest

            -   name: Build and push Docker image
                uses: docker/build-push-action@v6
                with:
                    context: .
                    push: true
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
                    cache-from: type=gha
                    cache-to: type=gha,mode=max
                    platforms: linux/amd64
                    build-args: |
                        API_BASE_URL=${{ secrets.API_BASE_URL }}
